version: "3.9"

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: alivedb-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # SQLite stored in persistent volume
      DATABASE_URL: "file:/app/data/alivedb.db"
      PING_TIMEOUT_MS: "10000"
      PING_MAX_RETRIES: "2"
      # Change this secret before deploying!
      CRON_SECRET: "change-this-to-a-strong-random-secret"
      NODE_ENV: "production"
    volumes:
      - alivedb-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  alivedb-data:
    driver: local
